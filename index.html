<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Planner Pro</title>
    <style>
        /* Reset and Base Styles */
        * { box-sizing: border-box; margin:0; padding:0; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes popIn {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes shakeBounce {
            0% { transform: translateX(0) rotate(0deg); }
            20% { transform: translateX(-10px) rotate(-5deg); }
            40% { transform: translateX(10px) rotate(5deg); }
            60% { transform: translateX(-10px) rotate(-5deg); }
            80% { transform: translateX(10px) rotate(5deg); }
            100% { transform: translateX(0) rotate(0deg); }
        }

        .card.easter-activated {
            animation: shakeBounce 0.8s ease-in-out;
            border-color: #ff9800;
            box-shadow: 0 15px 30px rgba(255, 152, 0, 0.3);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            background: #f0f4f8;
            overflow-x: hidden;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 420px;
            animation: fadeInUp 0.6s ease-out;
        }

        h2 { 
            text-align: center; 
            color: #333; 
            margin-bottom: 25px; 
            font-size: 26px; 
        }

        label { 
            display: block; 
            margin-top: 15px; 
            font-size: 14px; 
            color: #666; 
            font-weight: 600; 
        }

        .label-with-info {
            display: flex;
            align-items: center;
            margin-top: 15px;
        }

        .info-btn {
            background: #e2e8f0;
            color: #4a5568;
            border: none;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 11px;
            font-weight: bold;
            margin-left: 8px;
            cursor: pointer;
        }

        .help-text {
            font-size: 12px;
            color: #718096;
            background: #f7fafc;
            padding: 8px;
            border-radius: 5px;
            margin-top: 5px;
            display: none;
            border: 1px dashed #cbd5e0;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }

        input:focus { 
            border-color: #007bff; 
            outline: none; 
            box-shadow: 0 0 5px rgba(0,123,255,0.2); 
        }

        .preset-buttons {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .preset-btn {
            padding: 8px 14px;
            font-size: 13px;
            background: #f8f9fa;
            border: 1px solid #ddd;
            border-radius: 6px;
            cursor: pointer;
        }

        .preset-btn:hover {
            background: #e9ecef;
        }

        .calc-btn {
            width: 100%;
            padding: 14px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            margin-top: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }

        .calc-btn:hover { 
            background: #0056b3; 
            transform: scale(1.02); 
        }

        .refresh-btn {
            width: 100%;
            background: none;
            border: none;
            color: #888;
            margin-top: 12px;
            font-size: 13px;
            cursor: pointer;
        }

        .result-box {
            margin-top: 25px;
            padding: 20px;
            border-radius: 10px;
            background: #f8f9fa;
            border-left: 5px solid #007bff;
            animation: popIn 0.4s ease-out;
            display: none;
        }

        .status-pass { 
            border-left-color: #28a745; 
            background: #f1f9f2; 
        }
        .status-fail { 
            border-left-color: #d9534f; 
            background: #fdf2f2; 
        }

        .perc { 
            font-size: 32px; 
            text-align: center; 
            margin-bottom: 12px; 
            font-weight: 800; 
        }

        .info { 
            font-size: 15px; 
            color: #444; 
            line-height: 1.7; 
        }

        .highlight-red { color: #d9534f; font-weight: bold; }
        .highlight-green { color: #28a745; font-weight: bold; }

        .inline-select { 
            padding: 6px 10px; 
            border-radius: 6px; 
            border: 1px solid #ccc; 
            font-size: 14px;
        }

        .action-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 25px;
            gap: 10px;
        }

        .action-btn {
            flex: 1;
            padding: 13px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        .history-btn { background: #17a2b8; color: white; }
        .share-btn { background: #28a745; color: white; }

        /* History Modal */
        .history-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .history-content {
            background: white;
            width: 100%;
            max-width: 420px;
            border-radius: 15px;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .history-header {
            padding: 15px 20px;
            background: #f8f9fa;
            border-bottom: 1px solid #ddd;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
        }

        .history-body {
            padding: 10px;
            overflow-y: auto;
            flex: 1;
        }

        .history-item {
            background: #f8f9fa;
            margin: 8px 0;
            padding: 14px 16px;
            border-radius: 10px;
            border-left: 5px solid #007bff;
            position: relative;
        }

        .delete-item {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #dc3545;
            color: white;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
        }

        .error-box {
            background: #fdf2f2;
            color: #d9534f;
            padding: 12px;
            border-radius: 8px;
            margin: 15px 0;
            border-left: 4px solid #d9534f;
            font-size: 14px;
            display: none;
        }

        .footer { 
            position: fixed; 
            bottom: 15px; 
            width: 100%; 
            text-align: center; 
            font-size: 11px; 
            color: #999; 
            cursor: pointer; 
        }

        .confetti {
            position: fixed;
            width: 8px;
            height: 8px;
            z-index: 9999;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Attendance Planner Pro</h2>

    <form onsubmit="calculate(); return false;">
        <label>Total classes present:</label>
        <input type="number" id="present" placeholder="Ex: 45" inputmode="numeric" required>

        <label>Total classes held:</label>
        <input type="number" id="total" placeholder="Ex: 60" inputmode="numeric" required>

        <div class="label-with-info">
            <label>Target percentage (%):</label>
            <button type="button" class="info-btn" onclick="toggleHelp()">i</button>
        </div>
        <div id="help-target" class="help-text">
            Enter the minimum attendance percentage you want to maintain (usually 75% or 80%).
        </div>
        <input type="number" id="want" placeholder="Ex: 75" inputmode="numeric" required>

        <!-- Quick Preset Buttons -->
        <div class="preset-buttons">
            <button type="button" class="preset-btn" onclick="setTarget(75)">75%</button>
            <button type="button" class="preset-btn" onclick="setTarget(80)">80%</button>
            <button type="button" class="preset-btn" onclick="setTarget(85)">85%</button>
        </div>

        <div id="error-box" class="error-box"></div>

        <button type="submit" class="calc-btn">Calculate Status</button>
        
        <button type="button" class="refresh-btn" onclick="resetForm()">
            ↺ Clear all data
        </button>
    </form>

    <div id="result" class="result-box">
        <div id="currentPerc" class="perc"></div>
        <div id="details" class="info"></div>
    </div>

    <!-- Action Buttons -->
    <div class="action-buttons">
        <button class="action-btn history-btn" onclick="showHistory()">📜 History</button>
        <button class="action-btn share-btn" onclick="shareResult()">🔗 Share</button>
    </div>
</div>

<!-- History Modal -->
<div id="historyModal" class="history-modal">
    <div class="history-content">
        <div class="history-header">
            <span>📋 Calculation History</span>
            <div style="display:flex; align-items:center; gap:10px;">
                <button onclick="deleteAllHistory()" style="background:#dc3545; color:white; border:none; padding:8px 14px; border-radius:6px; cursor:pointer;">🗑️ Delete All</button>
                <button onclick="closeHistory()" style="background:#dc3545; color:white; border:none; width:36px; height:36px; border-radius:50%; font-size:20px; cursor:pointer;">✕</button>
            </div>
        </div>
        <div id="historyBody" class="history-body"></div>
    </div>
</div>

<div class="footer">MADE BY SHARAVAN RAJ</div>

<script>
// ====================== ALL FIXED & IMPROVED CODE ======================

function toggleHelp() {
    const helpEl = document.getElementById('help-target');
    helpEl.style.display = (helpEl.style.display === 'block') ? 'none' : 'block';
}

function showError(msg) {
    const errorBox = document.getElementById('error-box');
    errorBox.textContent = msg;
    errorBox.style.display = 'block';
    
    setTimeout(() => {
        errorBox.style.display = 'none';
    }, 4500);
}

function setTarget(value) {
    document.getElementById('want').value = value;
}

function saveToHistory(present, total, want, currentPerc) {
    let history = JSON.parse(localStorage.getItem("attendanceHistory") || "[]");
    
    const entry = {
        id: Date.now(),
        present: parseFloat(present),
        total: parseFloat(total),
        want: parseFloat(want),
        currentPerc: parseFloat(currentPerc.toFixed(1)),
        date: new Date().toLocaleString('en-GB', { 
            day: '2-digit', month: '2-digit', year: 'numeric', 
            hour: '2-digit', minute: '2-digit' 
        })
    };

    history.unshift(entry);
    if (history.length > 20) history.pop();
    localStorage.setItem("attendanceHistory", JSON.stringify(history));
}

function showHistory() {
    const modal = document.getElementById('historyModal');
    const body = document.getElementById('historyBody');
    let history = JSON.parse(localStorage.getItem("attendanceHistory") || "[]");

    if (history.length === 0) {
        body.innerHTML = `<p style="text-align:center; color:#888; padding:30px;">No calculation history yet.</p>`;
    } else {
        body.innerHTML = '';
        history.forEach(item => {
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `
                <strong>${item.currentPerc}%</strong> <span style="color:#666;">(Target ${item.want}%)</span><br>
                ${item.present} / ${item.total} classes<br>
                <small style="color:#888;">${item.date}</small>
                <button class="delete-item" onclick="deleteHistoryItem(${item.id}); event.stopImmediatePropagation();">🗑</button>
            `;
            body.appendChild(div);
        });
    }
    modal.style.display = 'flex';
}

function deleteHistoryItem(id) {
    let history = JSON.parse(localStorage.getItem("attendanceHistory") || "[]");
    history = history.filter(item => item.id !== id);
    localStorage.setItem("attendanceHistory", JSON.stringify(history));
    showHistory();
}

function deleteAllHistory() {
    if (confirm("Delete all calculation history?")) {
        localStorage.removeItem("attendanceHistory");
        showHistory();
    }
}

function closeHistory() {
    document.getElementById('historyModal').style.display = 'none';
}

function shareResult() {
    const percEl = document.getElementById('currentPerc');
    const detailsEl = document.getElementById('details');
    
    if (!percEl || percEl.innerText.trim() === "") {
        alert("Please calculate first before sharing!");
        return;
    }

    const currentPerc = percEl.innerText;
    let detailsText = detailsEl.innerText.trim();

    const want = document.getElementById('want').value || "Not set";

    let fullMessage = 
`🎯 Attendance Status: ${currentPerc}
Target: ${want}%

${detailsText}

Calculated with Attendance Planner Pro`;

    if (navigator.share) {
        navigator.share({ title: 'Attendance Planner Pro', text: fullMessage });
    } else {
        navigator.clipboard.writeText(fullMessage).then(() => {
            alert("✅ Result copied to clipboard!");
        });
    }
}

function resetForm() {
    document.getElementById('present').value = '';
    document.getElementById('total').value = '';
    document.getElementById('want').value = '';
    document.getElementById('result').style.display = 'none';
    document.getElementById('error-box').style.display = 'none';
}

function saveData(present, total, want) {
    localStorage.setItem("attendanceData", JSON.stringify({ present, total, want }));
}

// Main Calculation Function - All bugs fixed
function calculate() {
    const present = parseFloat(document.getElementById('present').value);
    const total = parseFloat(document.getElementById('total').value);
    const want = parseFloat(document.getElementById('want').value);

    const resBox = document.getElementById('result');
    const details = document.getElementById('details');
    const currentPercText = document.getElementById('currentPerc');

    // Hide previous error
    document.getElementById('error-box').style.display = 'none';

    // Validation
    if (isNaN(present) || isNaN(total) || isNaN(want)) {
        showError("Please fill all fields with valid numbers");
        return;
    }
    if (total <= 0 || want <= 0 || want >= 100) {
        showError("Target percentage must be between 1 and 99");
        return;
    }
    if (present < 0 || present > total) {
        showError("Present classes cannot be more than total classes");
        return;
    }

    saveData(present, total, want);

    const currentResult = (present / total) * 100;
    resBox.style.display = "block";
    resBox.classList.remove('status-pass', 'status-fail');
    currentPercText.innerText = currentResult.toFixed(1) + "%";

    // Safe classes per day reading
    let classesPerDay = 6;
    const rateSelect = document.getElementById('classRate');
    if (rateSelect) {
        const val = parseInt(rateSelect.value);
        if (!isNaN(val)) classesPerDay = val;
    }

    if (currentResult >= want) {
        // === ABOVE TARGET ===
        const canMiss = Math.max(0, Math.floor((100 * present / want) - total));
        
        resBox.classList.add('status-pass');
        currentPercText.style.color = "#28a745";
        
        details.innerHTML = `
            <span class="highlight-green">✅ Above Target!</span><br><br>
            You can safely miss <span class="highlight-green">${canMiss}</span> more classes 
            while staying above ${want}%.
        `;
    } else {
        // === BELOW TARGET ===
        const needed = Math.max(0, Math.ceil((want * total - 100 * present) / (100 - want)));
        const days = (needed / classesPerDay).toFixed(1);

        resBox.classList.add('status-fail');
        currentPercText.style.color = "#d9534f";
        
        details.innerHTML = `
            <span class="highlight-red">❌ Below Target!</span><br><br>
            
            📍 Classes still needed: <span class="highlight-red">${needed}</span><br>
            📅 Estimated days: <span class="highlight-red">${days} days</span><br><br>
            
            <span style="font-size: 14px; color: #666; display: flex; align-items: center; gap: 8px;">
                Assuming 
                <select id="classRate" class="inline-select" onchange="calculate()">
                    <option value="5" ${classesPerDay === 5 ? 'selected' : ''}>5</option>
                    <option value="6" ${classesPerDay === 6 ? 'selected' : ''}>6</option>
                    <option value="7" ${classesPerDay === 7 ? 'selected' : ''}>7</option>
                    <option value="8" ${classesPerDay === 8 ? 'selected' : ''}>8</option>
                    <option value="9" ${classesPerDay === 9 ? 'selected' : ''}>9</option>
                    <option value="10" ${classesPerDay === 10 ? 'selected' : ''}>10</option>
                </select> 
                classes per day
            </span>
        `;
    }

    saveToHistory(present, total, want, currentResult);
}

// Confetti Function
function spawnConfetti(count = 50) {
    const colors = ["#ff4d4d", "#4dff88", "#4db8ff", "#ffd24d", "#b84dff"];
    for (let i = 0; i < count; i++) {
        let confetti = document.createElement('div');
        confetti.classList.add('confetti');
        confetti.style.backgroundColor = colors[Math.floor(Math.random()*colors.length)];
        confetti.style.left = Math.random()*window.innerWidth + 'px';
        confetti.style.top = '-10px';
        confetti.style.width = confetti.style.height = (Math.random()*7 + 5) + 'px';
        document.body.appendChild(confetti);

        confetti.animate([
            { transform: `translateY(0) rotate(0deg)`, opacity: 1 },
            { transform: `translateY(${window.innerHeight + 100}px) rotate(${Math.random()*800}deg)`, opacity: 0 }
        ], {
            duration: 2500 + Math.random() * 1500,
            easing: 'ease-out'
        }).onfinish = () => confetti.remove();
    }
}

// Easter Egg
let clicks = 0;
document.querySelector(".footer").addEventListener("click", () => {
    clicks++;
    if (clicks === 5) {
        document.querySelector(".card").classList.add("easter-activated");
        setTimeout(() => document.querySelector(".card").classList.remove("easter-activated"), 900);
        spawnConfetti(60);
        console.log("%c🎉 Developer Mode Activated - Sharavan Raj was here!", "color: #ff9800; font-weight: bold");
        clicks = 0;
    }
});

// Load saved data on start
window.onload = function() {
    const saved = localStorage.getItem("attendanceData");
    if (saved) {
        const data = JSON.parse(saved);
        if (data.present) document.getElementById("present").value = data.present;
        if (data.total) document.getElementById("total").value = data.total;
        if (data.want) document.getElementById("want").value = data.want;
    }
};
</script>
</body>
</html>
